name: Sync to Hugging Face Hub

on:
  push:
    branches:
      - main
  workflow_dispatch:    

jobs:
  sync-to-huggingface:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitHub Repository
        uses: actions/checkout@v4
        with:
          lfs: true # Agar aap Git LFS files use kar rahe hain, toh isse enable karein

      - name: Install 7-Zip
        run: sudo apt-get install -y p7zip-full

      - name: Archive Source Code
        env:
          ZIP_PASS: ${{ secrets.ZIP_PASS }}
        run: |
          # Create password protected 7z archive of source code, excluding .git and .github
          7z a -p"$ZIP_PASS" -mhe=on code.7z . -xr!.git -xr!.github -xr!code.7z

      - name: Configure Git for Hugging Face Commit
        run: |
          git config --global user.email "action@github.com" # Apni pasand ka email use kar sakte hain
          git config --global user.name "GitHub Action"     # Apni pasand ka naam use kar sakte hain

      - name: Sync to Hugging Face Hub
        env:
          HUGGINGFACE_TOKEN: ${{ secrets.HUGGINGFACE_TOKEN }}
          HF_USERNAME: alex5402
          HF_REPO_TYPE: spaces #'models' ya 'spaces'
          HF_REPO_NAME: happybot 
          TARGET_DIR: hf-repo-clone
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          echo "Starting sync process..."

          # 1. Hugging Face repository ko clone karein
          git clone https://hf:$HUGGINGFACE_TOKEN@huggingface.co/$HF_REPO_TYPE/$HF_USERNAME/$HF_REPO_NAME $TARGET_DIR
          
          # 2. Create orphan branch to wipe history
          cd $TARGET_DIR
          git checkout --orphan temp_branch
          git rm -rf .
          cd ..

          # 3. Clean physical files (keep .git)
          find $TARGET_DIR/ -mindepth 1 -maxdepth 1 ! -name ".git" ! -name ".gitattributes" -exec rm -rf {} +
          
          # 4. Copy new files
          cp code.7z $TARGET_DIR/
          cp Dockerfile $TARGET_DIR/
          cp README.md $TARGET_DIR/
          
          # 5. Commit and Force Push
          cd $TARGET_DIR
          git add .
          git commit -m "$COMMIT_MSG"
          
          # Force push to main branch
          git push origin temp_branch:main
          echo "Successfully force-pushed changes to Hugging Face Hub (history wiped)!"